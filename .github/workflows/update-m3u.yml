name: Auto-Update IPTV Playlist

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          # Add the new .m3u file
          git add my_list.iptvcat.com.m3u
          # Remove the old .m3u8 file if it exists
          git rm my_list.iptvcat.com.m3u8 --ignore-unmatch
          git commit -m "Automated update: Scraped fresh links, cleaned URLs, and renamed to .m3u" || exit 0
          git push
