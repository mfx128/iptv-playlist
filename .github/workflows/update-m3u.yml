name: Auto-Update IPTV Playlist

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    env:
      # Opting into Node 24 early to clear the warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add my_list.iptvcat.com.m3u8
          git commit -m "Automated playlist update & cleanup" || exit 0
          git push
